<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-DESERT 2099 : 사막의 세 가지 보물</title>
    <style>
#asset-tag-overlay {
    display: none !important;
}
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

        :root {
            --bg-black: #0d0d12;
            --panel-color: rgba(16, 16, 24, 0.95);
            --accent-gold: #c09050;
            --neon-red: #ff4444;
            --toxic-green: #44ff44;
            --electric-cyan: #44ffff;
            --amber-yellow: #ffbb00;
            --text-main: #ffffff;
            --text-dim: #a0a0b0;
            --border-color: rgba(192, 144, 80, 0.25);
            --nav-gray: #555555;
            --stat-grad: linear-gradient(90deg, #44ff44 0%, #ffbb00 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: crosshair;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: 'IBM Plex Sans KR', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1c1712 0%, #060609 100%);
        }

        /* 게임 본체 컨테이너 */
        #game-frame {
            width: 1380px;
            height: 750px;
            background: var(--panel-color);
            border: 2px solid var(--border-color);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(192, 144, 80, 0.1);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* 고정 상단 워터마크 타이틀 */
        #always-on-title {
            position: absolute;
            top: 20px;
            left: 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: var(--accent-gold);
            letter-spacing: 3px;
            z-index: 90;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 8px rgba(192, 144, 80, 0.5);
        }

        #always-on-title::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--neon-red);
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* 좌측: 비주얼 스크린 영역 */
        #visual-viewport {
            width: 55%;
            height: 100%;
            background: #000000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        #visual-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 2;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
            background-size: 100% 4px, 6px 100%;
            z-index: 5;
            pointer-events: none;
        }

        #asset-tag-overlay {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.75);
            padding: 5px 12px;
            border: 1px solid var(--accent-gold);
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            color: var(--accent-gold);
            z-index: 10;
            letter-spacing: 1px;
        }

        .countdown-overlay {
            position: absolute;
            bottom: 20px; right: 20px;
            width: 50px; height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--accent-gold);
            border-radius: 50%;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--accent-gold);
            font-weight: bold;
            box-shadow: 0 0 10px rgba(192,144,80,0.5);
            background: rgba(0,0,0,0.8);
            z-index: 10;
        }

        /* 우측: 통합 제어 콘솔 */
        #console-viewport {
            width: 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: rgba(12, 12, 18, 0.98);
        }

        /* HUD 상태창 대시보드 */
        #hud-board {
            margin-top: 55px;
            padding: 20px 25px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .hud-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            position: relative;
            transition: all 0.3s ease;
        }

        .hud-label {
            font-size: 11px;
            display: block;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .hud-box.identity .hud-label { color: var(--neon-red); }
        .hud-box.stability .hud-label { color: var(--toxic-green); }
        .hud-box.humanity .hud-label { color: var(--electric-cyan); }
        .hud-box.noise .hud-label { color: var(--amber-yellow); }

        .hud-val {
            font-size: 22px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
        }

        .glitch-flash {
            animation: glitch-anim 0.15s infinite;
            border-color: var(--accent-gold) !important;
            background: rgba(192, 144, 80, 0.2) !important;
        }

        @keyframes glitch-anim {
            0% { transform: translate(2px, -1px); filter: hue-rotate(90deg); }
            50% { transform: translate(-1px, 2px); filter: invert(0.2); }
            100% { transform: translate(1px, 1px); }
        }

        /* 스크립트 대화 출력창 */
        #dialogue-area {
            flex: 1;
            padding: 25px 25px;
            overflow-y: auto;
            font-size: 15px;
            line-height: 1.7;
            color: #e2e2eb;
        }

        .scene-indicator {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-gold);
            font-size: 11px;
            letter-spacing: 2px;
            border: 1px solid var(--accent-gold);
            padding: 3px 8px;
            display: inline-block;
            margin-bottom: 15px;
            background: rgba(192, 144, 80, 0.05);
        }

        .location-sub-info {
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .narration {
            color: #a0a0b0;
            font-style: italic;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-left: 2px solid rgba(255,255,255,0.2);
            font-size: 13.5px;
        }

        .dialogue-box-container {
            border-left: 3px solid var(--accent-gold);
            padding-left: 14px;
            min-height: 120px;
        }

        /* 캐릭터 고유 네온 컬러 클래스 명세 */
        .ethan { color: #ff6b6b !important; font-weight: bold; }
        .barrett { color: #4dadf7 !important; font-weight: bold; }
        .zion { color: #33ffbb !important; font-weight: bold; }
        .echo { color: #e5dbff !important; font-weight: bold; }
        .luna { color: #ff85a2 !important; font-weight: bold; }
        .commander { color: #bebebe !important; font-weight: bold; }
        .aria { color: #fff3bf !important; font-weight: bold; }
        .system-hl { color: #ff4444 !important; font-weight: bold; }

        /* 선택지 영역 */
        #choices-area {
            padding: 25px;
            background: rgba(10, 10, 15, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-row {
            background: rgba(24, 24, 36, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 14px 20px;
            color: var(--text-main);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
        }

        .choice-row:hover {
            border-color: var(--accent-gold);
            background: rgba(192, 144, 80, 0.15);
            padding-left: 25px;
            box-shadow: 0 0 15px rgba(192, 144, 80, 0.2);
        }

        .choice-txt { font-weight: 600; }
        .choice-delta {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11.5px;
            color: var(--text-dim);
            background: rgba(255,255,255,0.08);
            padding: 3px 8px;
            border-radius: 4px;
        }

        /* 하단 제어 바 버튼 구역 */
        .nav-container {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }
        
        .nav-btn { 
            flex: 1; 
            background: transparent; 
            border: 1px solid var(--nav-gray); 
            color: var(--text-dim); 
            font-family: 'Orbitron', sans-serif; 
            font-size: 12px; 
            padding: 12px; 
            text-align: center; 
            cursor: pointer; 
            transition: 0.3s; 
            border-radius: 2px; 
            letter-spacing: 1px;
        }

        .nav-btn:hover { border-color: #999; color: #FFF; background: rgba(255, 255, 255, 0.05); }
        .nav-btn.active-stop { background: #333; color: #FFF; border-color: #888; }

        /* 오프닝 인트로 표지 레이어 */
        #cover-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.6s ease;
            border: 2px solid var(--border-color);
            background: #000;
        }

        #cover-bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.4;
            z-index: 1;
        }

        #cover-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #cover-overlay.fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.02);
        }

        .title-glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 6px;
            color: var(--text-main);
            text-shadow: 0 0 25px rgba(192, 144, 80, 0.6);
            margin-bottom: 5px;
        }

        .subtitle-glitch {
            font-size: 18px;
            color: var(--accent-gold);
            letter-spacing: 4px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .student-info-panel {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid var(--accent-gold);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 15px rgba(192, 144, 80, 0.2);
        }

        .student-info-panel label {
            display: block;
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .info-row-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            font-family: 'Share Tech Mono', 'IBM Plex Sans KR', sans-serif;
        }

        .info-row-container input {
            width: 140px;
            background: #000;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            color: #fff;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
        }

        .info-row-container input:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        .divider-txt {
            color: var(--accent-gold);
            font-size: 18px;
            font-weight: bold;
        }

        .enter-btn {
            background: rgba(0,0,0,0.7);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            font-family: 'Orbitron', sans-serif;
            padding: 14px 45px;
            font-size: 13px;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            border-radius: 30px;
        }

        .enter-btn:hover {
            background: var(--accent-gold);
            color: #000;
            box-shadow: 0 0 25px rgba(192, 144, 80, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="game-frame">
    <div id="always-on-title">NEO-DESERT 2099</div>

    <div id="cover-overlay">
        <img id="cover-bg-img" src="images/cover.png" alt="Cover Background">
        <div id="cover-content">
            <div class="title-glitch">NEO-DESERT 2099</div>
            <div class="subtitle-glitch">사막의 세 가지 보물</div>
            
            <div class="student-info-panel">
                <label>SUBMITTER CODE MATRIX</label>
                <div class="info-row-container">
                    <input type="text" id="student-id-input" placeholder="학번" value="25730018">
                    <span class="divider-txt">|</span>
                    <input type="text" id="student-name-input" placeholder="이름" value="조서연">
                </div>
            </div>

            <button class="enter-btn" onclick="initializeConsole()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="visual-viewport">
        <div class="scanlines"></div>
        <img id="visual-image" src="통합_표지.png" alt="Visual Asset">
        <div id="asset-tag-overlay">ASSET: 통합_표지.png</div>
        <div class="countdown-overlay" id="timer">00</div>
    </div>

    <div id="console-viewport">
        <div id="hud-board">
            <div class="hud-box identity" id="box-e">
                <span class="hud-label">E (Identity)</span>
                <span class="hud-val" id="hud-e-val">0</span>
            </div>
            <div class="hud-box stability" id="box-s">
                <span class="hud-label">S (Stability)</span>
                <span class="hud-val" id="hud-s-val">0</span>
            </div>
            <div class="hud-box humanity" id="box-h">
                <span class="hud-label">H (Humanity)</span>
                <span class="hud-val" id="hud-h-val">0</span>
            </div>
            <div class="hud-box noise" id="box-n">
                <span class="hud-label">N (Noise)</span>
                <span class="hud-val" id="hud-n-val">0</span>
            </div>
        </div>

        <div id="dialogue-area">
            <div id="scene-tag-zone"></div>
            <div id="location-tag-zone" class="location-sub-info"></div>
            <div id="narrative-zone" class="narrative-text"></div>
            <div id="typing-text-zone" class="dialogue-box-container"></div>
        </div>

        <div id="choices-area">
            <div id="choices-list"></div>
            <div class="nav-container">
                <div class="nav-btn" onclick="handleBack()">BACK</div>
                <div class="nav-btn" id="btn-play" onclick="handlePlayToggle()">STOP</div>
            </div>
        </div>
    </div>
</div>

<script>
    let state = { e: 0, s: 0, h: 0, n: 0, adminKey: false, currentScene: "S1", history: [], timer: 0, isPaused: false };
    let typingLineIdx = 0;
    let typingCharIdx = 0;
    let typingTimeout = null;
    let timerInterval = null;

    let vrewVoice = null; 
    let bgmAudio = null; 

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function triggerSound(freq, type, duration) {
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e){}
    }

    function getSpeakerClass(name) {
        if (name === '에단') return 'ethan';
        if (name === '바렛') return 'barrett';
        if (name === '시온') return 'zion';
        if (name === '메아리' || name === '메아리(echo)') return 'echo';
        if (name === '루나') return 'luna';
        if (name === '커맨더 제로') return 'commander';
        if (name === '아리아 공주') return 'aria';
        if (name.includes('시스템') || name.includes('SYSTEM')) return 'system-hl';
        return '';
    }

    // 🎵 배경음악 구동 엔진 (대소문자 자동 방어 및 유저 인터랙션 안전망 반영)
    function playBackgroundMusic() {
        if (!bgmAudio) {
            bgmAudio = new Audio("audio/bgm.mp3"); 
            bgmAudio.loop = true;
            bgmAudio.volume = 0.3; 
            
            bgmAudio.play().then(() => {
                console.log("BGM 재생 완료");
            }).catch(e => {
                console.log("자동재생 차단 우회 가동");
                document.body.addEventListener('click', () => {
                    if (bgmAudio) bgmAudio.play().catch(err => {});
                }, { once: true });
            });
        }
    }

    function initializeConsole() {
        const studentId = document.getElementById('student-id-input').value.trim();
        const studentName = document.getElementById('student-name-input').value.trim();
        if(!studentId || !studentName) {
            alert("학번과 이름을 입력해 주세요.");
            return;
        }
        triggerSound(523.25, 'sine', 0.15);
        document.getElementById('cover-overlay').classList.add('fade-out');
        
        // 🎵 메인 인트로 통과 시 BGM 재생 시작
        playBackgroundMusic();
        
        transitScene("S1");
    }

    function handlePlayToggle() {
        state.isPaused = !state.isPaused;
        const btn = document.getElementById('btn-play');
        if (state.isPaused) {
            btn.innerText = 'PLAY';
            btn.classList.add('active-stop');
            if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }
            if (vrewVoice) vrewVoice.pause(); 
            if (bgmAudio) bgmAudio.pause(); // 🎵 일시정지 시 BGM도 STOP
        } else {
            btn.innerText = 'STOP';
            btn.classList.remove('active-stop');
            startTypingLoop();
            if (vrewVoice) vrewVoice.play().catch(e => {}); 
            if (bgmAudio) bgmAudio.play().catch(e => {}); // 🎵 재개 시 BGM도 PLAY
        }
    }

    function handleBack() {
        if (state.history.length > 0) {
            state = state.history.pop();
            document.getElementById('hud-e-val').innerText = state.e;
            document.getElementById('hud-s-val').innerText = state.s;
            document.getElementById('hud-h-val').innerText = state.h;
            document.getElementById('hud-n-val').innerText = state.n;
            transitScene(state.currentScene, false);
        }
    }

    function runTimer() {
        if (timerInterval) clearInterval(timerInterval);
        const timerEl = document.getElementById('timer');
        timerInterval = setInterval(() => {
            if (state.isPaused) return;
            state.timer++;
            timerEl.innerText = state.timer < 10 ? `0${state.timer}` : state.timer;
            if (state.timer >= 16) {
                clearInterval(timerInterval);
                const currentScene = database[state.currentScene];
                if (currentScene && currentScene.choices.length > 0) {
                    const firstChoice = currentScene.choices[0];
                    executeChoice(firstChoice);
                }
            }
        }, 1000);
    }

    function startTypingLoop() {
        if (state.isPaused) return;
        const currentScene = database[state.currentScene];
        const target = document.getElementById('typing-text-zone');

        if (!currentScene || typingLineIdx >= currentScene.dialogue.length) {
            renderChoices();
            return;
        }

        const line = currentScene.dialogue[typingLineIdx];
        
        let lineEl = target.querySelector(`[data-line="${typingLineIdx}"]`);
        if (!lineEl) {
            lineEl = document.createElement('div');
            lineEl.setAttribute('data-line', typingLineIdx);
            lineEl.style.marginBottom = '12px';
            
            const speakerClass = getSpeakerClass(line.speaker);
            lineEl.innerHTML = `<span class="${speakerClass}">${line.speaker} : </span><span class="char-container" style="color: #FFF;"></span>`;
            target.appendChild(lineEl);
        }

        const charContainer = lineEl.querySelector('.char-container');

        if (typingCharIdx < line.text.length) {
            charContainer.textContent += line.text.charAt(typingCharIdx);
            typingCharIdx++;
            if (typingCharIdx % 2 === 0) triggerSound(1300, 'square', 0.008);
            
            const dialogueArea = document.getElementById('dialogue-area');
            dialogueArea.scrollTop = dialogueArea.scrollHeight;
            typingTimeout = setTimeout(startTypingLoop, 25);
        } else {
            typingLineIdx++;
            typingCharIdx = 0;
            typingTimeout = setTimeout(startTypingLoop, 500);
        }
    }

    function renderChoices() {
        const currentScene = database[state.currentScene];
        const listZone = document.getElementById('choices-list');
        listZone.innerHTML = "";

        currentScene.choices.forEach(choice => {
            if (choice.cond && !choice.cond()) return;

            const row = document.createElement('div');
            row.className = 'choice-row';

            let deltaString = "";
            let segments = [];
            if(choice.e) segments.push(`E:${choice.e > 0 ? '+'+choice.e : choice.e}`);
            if(choice.s) segments.push(`S:${choice.s > 0 ? '+'+choice.s : choice.s}`);
            if(choice.h) segments.push(`H:${choice.h > 0 ? '+'+choice.h : choice.h}`);
            if(choice.n) segments.push(`N:${choice.n > 0 ? '+'+choice.n : choice.n}`);
            if(choice.key) segments.push("KEY");
            if(segments.length > 0) deltaString = `${segments.join(' ')}`;

            row.innerHTML = `
                <span class='choice-txt'>> ${choice.text}</span>
                <span class='choice-delta'>${deltaString}</span>
            `;

            row.onclick = () => executeChoice(choice);
            listZone.appendChild(row);
        });
    }

    function executeChoice(choice) {
        triggerSound(523.25, 'sine', 0.15);
        state.history.push(JSON.parse(JSON.stringify(state)));

        const eAdd = choice.e || 0;
        const sAdd = choice.s || 0;
        const hAdd = choice.h || 0;
        const nAdd = choice.n || 0;

        state.e += eAdd;
        state.s += sAdd;
        state.h += hAdd;
        state.n += nAdd;
        if(choice.key !== undefined) state.adminKey = choice.key;

        document.getElementById('hud-e-val').innerText = state.e;
        document.getElementById('hud-s-val').innerText = state.s;
        document.getElementById('hud-h-val').innerText = state.h;
        document.getElementById('hud-n-val').innerText = state.n;

        flashHudGlitch(eAdd, sAdd, hAdd, nAdd);
        
        if (choice.next === "RESET") {
            location.reload();
        } else {
            transitScene(choice.next);
        }
    }

    function flashHudGlitch(eDiff, sDiff, hDiff, nDiff) {
        triggerSound(80, 'sawtooth', 0.25);
        if(eDiff !== 0) document.getElementById('box-e').classList.add('glitch-flash');
        if(sDiff !== 0) document.getElementById('box-s').classList.add('glitch-flash');
        if(hDiff !== 0) document.getElementById('box-h').classList.add('glitch-flash');
        if(nDiff !== 0) document.getElementById('box-n').classList.add('glitch-flash');

        setTimeout(() => {
            document.getElementById('box-e').classList.remove('glitch-flash');
            document.getElementById('box-s').classList.remove('glitch-flash');
            document.getElementById('box-h').classList.remove('glitch-flash');
            document.getElementById('box-n').classList.remove('glitch-flash');
        }, 400);
    }

    function transitScene(sceneId, resetTimer = true) {
        state.currentScene = sceneId;
        const currentScene = database[sceneId];
        if(!currentScene) return;

        if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }

        if (vrewVoice) {
            vrewVoice.pause();
            vrewVoice = null;
        }

        // 🎵 대사 리프레시 시 BGM 기본 볼륨(0.3) 가복구
        if (bgmAudio) bgmAudio.volume = 0.3;

        const imgElement = document.getElementById('visual-image');
        const targetAsset = currentScene.asset || "통합_표지.png";

        if (targetAsset.toLowerCase().endsWith('.mp4')) {
            imgElement.outerHTML = `<video id="visual-image" src="${targetAsset}" autoplay loop muted style="width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.2s;"></video>`;
        } else {
            imgElement.outerHTML = `<img id="visual-image" src="${targetAsset}" alt="Visual Asset" style="width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 0.2s;">`;
        }

        setTimeout(() => {
            const nextElement = document.getElementById('visual-image');
            if (nextElement) nextElement.style.opacity = 1;
        }, 200);
        
        document.getElementById('asset-tag-overlay').innerText = `ASSET: ${targetAsset}`;
        document.getElementById('scene-tag-zone').innerHTML = currentScene.tag ? `<span class="scene-indicator">${currentScene.tag}</span>` : "";
        document.getElementById('location-tag-zone').innerText = currentScene.location || "NEO DESERT SYSTEM";
        document.getElementById('narrative-zone').innerHTML = currentScene.narrative ? `<div class="narration">${currentScene.narrative}</div>` : "";
        
        document.getElementById('typing-text-zone').innerHTML = "";
        document.getElementById('choices-list').innerHTML = "";
        
        typingLineIdx = 0;
        typingCharIdx = 0;
        
        if (resetTimer) {
            state.timer = 0;
            document.getElementById('timer').innerText = '00';
        }

        state.isPaused = false;
        const btn = document.getElementById('btn-play');
        btn.innerText = 'STOP';
        btn.classList.remove('active-stop');

        // 🎵 [교수님 필수 사양] 오디오 재생 시 BGM 오디오 연동 덕킹 처리 (대사 시작 시 0.05배 축소)
        if (currentScene.audio) {
            vrewVoice = new Audio(currentScene.audio);
            
            vrewVoice.onplay = () => {
                if (bgmAudio) bgmAudio.volume = 0.05; 
            };
            vrewVoice.onended = () => {
                if (bgmAudio) bgmAudio.volume = 0.3;
            };

            vrewVoice.play().catch(error => {
                console.log("대사 파일 재생 대기");
            });
        }

        runTimer();
        startTypingLoop();
    }
